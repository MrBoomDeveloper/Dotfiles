###########################
#####   KEYBINDINGS   #####
###########################

# Main key
$mainMod = SUPER # Sets "Windows" key as main modifier

# Launchers (Pickers)
bind = $mainMod, Super_L, exec, ~/.config/rofi/launcher.sh
bindd = $mainMod, PERIOD, Clipboard manager, exec, clipvault list | rofi -theme ~/.config/rofi/launcher-style.rasi -dmenu -display-columns 2 | clipvault get | wl-copy
bindd = $mainMod, W, Wallpaper, exec, waypaper
bindd = $mainMod, P, Password Manager, exec, rofi-rbw --action copy --use-notify-send --selector rofi --selector-args="-theme ~/.config/rofi/launcher-style.rasi"
bindd = $mainMod, L, Power menu, exec, wlogout

# System integrations
bindd = $mainMod, N, Notification center, exec, swaync-client -op
bindd = , Print, Screenshot to clipboard, exec,  quickshell -c HyprQuickFrame -n
bindd = $mainMod, TAB, Workspaces overview, hyprexpo:expo, toggle

# Software shortcuts
bindd = $mainMod, Q, Terminal, exec, kitty
bindd = $mainMod, E, File Manager, exec, nemo
bindd = $mainMod, B, Browser, exec, floorp

# Window managment
bindd = $mainMod, C, Kill active window, killactive,
bindd = $mainMod SHIFT, C, Force kill active window, forcekillactive,
bindd = $mainMod, V, Toggle floating, togglefloating,
bindd = $mainMod, J, Toggle split, togglesplit, # dwindle
bindd = $mainMod, F, Fullscreen, fullscreen
bindd = Super_Shift, W, Active window info, exec, rofi -e "$(hyprctl activewindow)"

# Move focus with mainMod + arrow keys
bindd = $mainMod, left, Move focused window to left, movefocus, l
bindd = $mainMod, right, Move focused window to rigth, movefocus, r
bindd = $mainMod, up, Move focused window to up, movefocus, u
bindd = $mainMod, down, Move focused window to down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bindd = $mainMod, 1, Switch to workspace 1, focusworkspaceoncurrentmonitor, 1
bindd = $mainMod, 2, Switch to workspace 2, focusworkspaceoncurrentmonitor, 2
bindd = $mainMod, 3, Switch to workspace 3, focusworkspaceoncurrentmonitor, 3
bindd = $mainMod, 4, Switch to workspace 4, focusworkspaceoncurrentmonitor, 4
bindd = $mainMod, 5, Switch to workspace 5, focusworkspaceoncurrentmonitor, 5
bindd = $mainMod, 6, Switch to workspace 6, focusworkspaceoncurrentmonitor, 6
bindd = $mainMod, 7, Switch to workspace 7, focusworkspaceoncurrentmonitor, 7
bindd = $mainMod, 8, Switch to workspace 8, focusworkspaceoncurrentmonitor, 8
bindd = $mainMod, 9, Switch to workspace 9, focusworkspaceoncurrentmonitor, 9
bindd = $mainMod, 0, Switch to workspace 10, focusworkspaceoncurrentmonitor, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move active window
bind = $mainMod SHIFT, LEFT, movewindow, l
bind = $mainMod SHIFT, RIGHT, movewindow, r
bind = $mainMod SHIFT, UP, movewindow, u
bind = $mainMod SHIFT, DOWN, movewindow, d

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Audio controls
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
binddel = ,XF86AudioRaiseVolume, Raise volume, exec, swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --output-volume +1
binddel = ,XF86AudioLowerVolume, Lower volume, exec, swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --output-volume -1
binddel = ,XF86AudioMute, Mute audio, exec, swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --output-volume mute-toggle
binddel = ,XF86AudioMicMute, Mute microphone, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness controls
binddel = ,XF86MonBrightnessUp, Increate brightness, exec, swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --brightness +5
binddel = ,XF86MonBrightnessDown, Decrease brightness, exec, swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --brightness -5
